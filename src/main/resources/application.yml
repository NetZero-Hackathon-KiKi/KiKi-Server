spring:
  datasource:

    url: ${DB_URL:jdbc:mysql://localhost:3306/netzero?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:12345678}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

gemini:
  api-key: ${GEMINI_API_KEY:AQ.Ab8RN6JgulCZzI5WIJQD4VYdodin5l3kwdUY7GY313uAYupvdQ}

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET:netzero-08-quest-images}
    region: ${AWS_REGION:us-east-1}
