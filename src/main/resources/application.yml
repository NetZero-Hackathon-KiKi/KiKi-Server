spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/netzero}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

gemini:
  api-key: ${GEMINI_API_KEY:}

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET:netzero-08-quest-images}
    region: ${AWS_REGION:us-east-1}
